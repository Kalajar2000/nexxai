<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0d0f1e">

    <title>NEXXAI AI - 3D model preview</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="redesign.css?v=11">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800&family=Poppins:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body{min-height:100vh;display:flex;flex-direction:column}
        .mv-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:96px 20px 20px;position:relative}
        model-viewer{width:min(720px,92vw);height:78vh;background:transparent;--poster-color:transparent}
        .mv-glow{position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.35),transparent 60%);filter:blur(50px);z-index:-1;top:50%;left:50%;transform:translate(-50%,-50%)}
        .mv-head{position:fixed;top:26px;left:0;right:0;text-align:center;z-index:5}
        .mv-head .eyebrow{margin-bottom:6px}
        .mv-head h1{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:clamp(1.8rem,4vw,2.8rem)}
        .mv-note{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:5;font-size:.84rem;color:var(--muted);padding:10px 18px;border-radius:999px;text-align:center;max-width:92vw}
        .mv-note b{color:#fff}
    </style>
</head>
<body>
    <div class="bg-fx"></div>
    <div class="bg-grid"></div>

    <div class="mv-head">
        <span class="eyebrow">Hero robot · build A3 · porcelain</span>
        <h1 class="serif">Meet the NEXXAI AI</h1>
    </div>

    <div class="mv-wrap">
        <div class="mv-glow"></div>
        <model-viewer
            src="assets/robot.glb?v=3"
            alt="NEXXAI AI 3D model"
            camera-controls
            auto-rotate
            auto-rotate-delay="0"
            rotation-per-second="18deg"
            interaction-prompt="none"
            shadow-intensity="0.9"
            exposure="1.05"
            environment-image="neutral"
            camera-orbit="0deg 85deg 2.4m"
            min-camera-orbit="auto auto 1.2m"
            max-camera-orbit="auto auto 6m">
        </model-viewer>
    </div>

    <div class="mv-note glass">
        <b>Drag to rotate</b>, scroll to zoom. Porcelain skin, glass cranium, magenta brain, deep cables, now compressed to 3.3 MB (web-ready). The live glass + moving brain flashes get added in code when she goes into the hero.
    </div>

    <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
</body>
</html>
