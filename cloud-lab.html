<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0d0f1e">

    <title>Cloud Lab · NEXXAI</title>
    <meta name="robots" content="noindex">
    <script type="importmap">
    {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; background: #05050c; color: #eaf0ff; font-family: 'Inter', sans-serif; overflow: hidden; }
        body { background: radial-gradient(120% 90% at 50% -10%, #14122e 0%, #0a0a18 50%, #05050c 100%); }
        .lab-top { position: fixed; top: 0; left: 0; right: 0; z-index: 20; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; padding: 14px 20px; }
        .lab-title { font-family: 'Poppins', sans-serif; font-size: .9rem; font-weight: 600; }
        .lab-build { font-size: .62rem; letter-spacing: .14em; text-transform: uppercase; color: #9b8cff; border: 1px solid rgba(155,140,255,.4); border-radius: 999px; padding: 2px 8px; margin-left: 8px; }
        .lab-switch { display: flex; gap: 8px; }
        .lab-switch button { padding: 9px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.04); color: #b9c2dd; font: inherit; font-size: .82rem; font-weight: 600; cursor: pointer; transition: .2s; }
        .lab-switch button:hover { color: #fff; border-color: #8b5cf6; }
        .lab-switch button.active { color: #fff; background: linear-gradient(135deg, #8b5cf6, #3b82f6); border-color: transparent; box-shadow: 0 6px 20px rgba(139,92,246,.45); }
        .lab-hint { font-size: .82rem; color: #8b93ad; flex: 1 1 100%; }
        .stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; }
        .stage[hidden] { display: none !important; }
        #matrix { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .55; }
        #cv-3d { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: grab; }
        #cv-3d:active { cursor: grabbing; }
        .stage-cap { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: .8rem; color: #8b93ad; background: rgba(10,10,22,.7); border: 1px solid rgba(255,255,255,.08); padding: 7px 14px; border-radius: 999px; white-space: nowrap; }
        .model-msg { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: #aab4d4; text-align: center; padding: 24px; }
        .model-msg .spin { width: 38px; height: 38px; border-radius: 50%; border: 3px solid rgba(139,92,246,.25); border-top-color: #8b5cf6; animation: sp 1s linear infinite; }
        @keyframes sp { to { transform: rotate(360deg); } }

        /* image option — liquid glass frame */
        #img-tilt { position: relative; width: min(74vw, 900px); aspect-ratio: 1390 / 1160; transition: transform .25s ease; will-change: transform; }
        .glass-frame { position: absolute; inset: -14px; border-radius: 28px; background: rgba(255,255,255,0.012); background-blend-mode: luminosity; -webkit-backdrop-filter: blur(18px); backdrop-filter: blur(18px); box-shadow: 0 30px 80px rgba(0,0,0,.6), inset 0 1px 1px rgba(255,255,255,.15); overflow: hidden; }
        .glass-frame::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px; background: linear-gradient(180deg, rgba(255,255,255,.5) 0%, rgba(255,255,255,.2) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,.2) 80%, rgba(255,255,255,.5) 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        #img-tilt img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 18px; box-shadow: 0 0 60px rgba(80,60,180,.35); }
        .img-glow { position: absolute; inset: -8%; border-radius: 30px; background: radial-gradient(closest-side, rgba(123,92,246,.4), transparent 70%); filter: blur(30px); z-index: -1; animation: pulse 4s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: .9; } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="lab-top">
        <div class="lab-title">Cloud / software state<span class="lab-build">build 10</span></div>
        <div class="lab-switch">
            <button data-v="3d" class="active">① 3D model</button>
        </div>
        <div class="lab-hint" id="hint"></div>
    </div>

    <!-- ① proper 3D model viewer -->
    <section class="stage" id="stage-3d">
        <canvas id="cv-3d"></canvas>
        <div class="model-msg" id="model-msg">
            <div class="spin"></div>
            <div>The 3D cloud mesh is loading / regenerating.<br>Refresh in a minute.</div>
        </div>
        <div class="stage-cap">Full 3D scene (laptop + cloud + devices) — drag to rotate, scroll to zoom</div>
    </section>

    <script type="module" src="cloud-lab.js"></script>
</body>
</html>
